<!DOCTYPE html>
<html lang="en">
<head>
  <title>Vedic Rashi Love Calculator | Astrological Compatibility</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <style>
    body {
      background: radial-gradient(circle at 10% 20%, #1a1a2e, #16213e);
      background-attachment: fixed;
      font-family: 'Segoe UI', 'Poppins', sans-serif;
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cosmic-card {
      max-width: 600px;
      width: 92%;
      border-radius: 48px;
      background: rgba(255, 248, 245, 0.96);
      box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 2px #ffd8b5 inset;
      overflow: hidden;
      transition: all 0.2s;
    }
    .card-header-cosmic {
      background: linear-gradient(120deg, #a63462, #c73c6e);
      color: #fff3e0;
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      letter-spacing: 2px;
      border-bottom: 3px solid #ffbc7a;
    }
    .form-control-astro {
      background: #fffaf5;
      border: 2px solid #f3c3d3;
      border-radius: 60px;
      padding: 12px 20px;
      text-align: center;
      font-weight: 500;
      transition: 0.2s;
      width: 190px;
    }
    .btn-rashi {
      background: linear-gradient(95deg, #2c5f2d, #3e7c3f);
      border: none;
      border-radius: 60px;
      padding: 12px 5px;
      font-weight: bold;
      font-size: 1.2rem;
      color: white;
      box-shadow: 0 5px 12px rgba(46,125,50,0.4);
    }
    .result-percent {
      background: #2d1b36;
      border-radius: 60px;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      color: #ffdfb8;
      font-family: monospace;
      letter-spacing: 3px;
      border: 1px solid #f7b05e;
    }
    .rashi-badge {
      background: #efe2d4;
      border-radius: 50px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b2e4a;
      display: inline-block;
      margin-top: 12px;
    }
    .info-note {
      font-size: 0.75rem;
      background: #ebdfd7;
      border-radius: 30px;
      padding: 8px;
      color: #55423d;
    }
    @media (max-width: 500px) {
      .form-control-astro { width: 140px; font-size: 0.9rem; }
      .card-header-cosmic { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="cosmic-card">
  <div class="card-header-cosmic">
    🌙✨ RASHI MILAN (Vedic Love) ✨🌙
  </div>
  <div class="card-body text-center p-4">
    <div class="d-flex justify-content-center flex-wrap align-items-center gap-3 mb-3">
      <input type="text" class="form-control-astro text-center" placeholder="🔮 Your name" id="name1" autocomplete="off">
      <span style="font-size: 28px; color:#b33b5c;">☯️</span>
      <input type="text" class="form-control-astro text-center" placeholder="💖 Beloved name" id="name2" autocomplete="off">
    </div>
    
    <button class="btn btn-rashi w-75 mt-2 mb-4" onclick="calculateRashiCompatibility()">
      🪐 REVEAL COSMIC TRUTH 🪐
    </button>
    
    <input type="text" class="form-control result-percent w-75 m-auto text-center" placeholder="❄️ % ❄️" id="lovevalue" readonly>
    
    <div class="rashi-badge mt-3">
      📜 Based on Vedic astrology | Nakshatra & Graha Maitri
    </div>
    <div class="info-note mt-3">
      ⚡ No artificial 100% — actual rashi (zodiac) derived from name sound, planetary friendship, and lunar constellation.
    </div>
    <div class="card-footer bg-transparent text-muted mt-3 small border-0">
      🙏 May the Navagrahas bless your union 🙏
    </div>
  </div>
</div>

<script>
/**
 * HONEST VEDIC ASTROLOGY ENGINE
 * ---------------------------------
 * Never gives 100% randomly. Uses:
 * 1. Name → Rashi (Zodiac sign) based on starting phoneme (Vedic 'Namakarana' system)
 * 2. Graha Maitri (Planetary friendship between ruling planets of each Rashi)
 * 3. Nakshatra (constellation) compatibility derived from name length and vowel harmony
 * 4. Element (Fire, Earth, Air, Water) resonance
 * 5. Final percentage: weighted formula max ~94% for rare perfect matches (same rashi + exalted planets + nakshatra harmony)
 * 
 * NO artificial boost, NO random, NO guaranteed 100%
 */

// ---------- 1. RASHI MAPPING based on first letter sound (Vedic standard) ----------
// Each starting consonant/vowel maps to a zodiac sign (Mesha to Meena)
const rashiMap = {
  // Aries (Mesha) - ruled by Mars: sounds: Chu, Che, Cho, La, Li, Lu, Le, Lo, A
  'a': 'Aries', 'ch': 'Aries', 'che': 'Aries', 'cho': 'Aries', 'chu': 'Aries',
  'la': 'Aries', 'li': 'Aries', 'lu': 'Aries', 'le': 'Aries', 'lo': 'Aries',
  // Taurus (Vrishabha) - Venus: E, U, I, O, Va, Vi, Vu, Ve, Vo
  'e': 'Taurus', 'u': 'Taurus', 'i': 'Taurus', 'o': 'Taurus',
  'va': 'Taurus', 'vi': 'Taurus', 'vu': 'Taurus', 've': 'Taurus', 'vo': 'Taurus',
  // Gemini (Mithuna) - Mercury: Ka, Ki, Ku, Ke, Ko, Ra, Ri, Ru, Re, Ro
  'ka': 'Gemini', 'ki': 'Gemini', 'ku': 'Gemini', 'ke': 'Gemini', 'ko': 'Gemini',
  'ra': 'Gemini', 'ri': 'Gemini', 'ru': 'Gemini', 're': 'Gemini', 'ro': 'Gemini',
  // Cancer (Karka) - Moon: Hi, Hu, He, Ho, Da, Di, Du, De, Do
  'hi': 'Cancer', 'hu': 'Cancer', 'he': 'Cancer', 'ho': 'Cancer',
  'da': 'Cancer', 'di': 'Cancer', 'du': 'Cancer', 'de': 'Cancer', 'do': 'Cancer',
  // Leo (Simha) - Sun: Ma, Mi, Mu, Me, Mo, Ta, Ti, Tu, Te, To
  'ma': 'Leo', 'mi': 'Leo', 'mu': 'Leo', 'me': 'Leo', 'mo': 'Leo',
  'ta': 'Leo', 'ti': 'Leo', 'tu': 'Leo', 'te': 'Leo', 'to': 'Leo',
  // Virgo (Kanya) - Mercury: Pa, Pi, Pu, Pe, Po, Sha, Shi, Shu, She, Sho, Na
  'pa': 'Virgo', 'pi': 'Virgo', 'pu': 'Virgo', 'pe': 'Virgo', 'po': 'Virgo',
  'sha': 'Virgo', 'shi': 'Virgo', 'shu': 'Virgo', 'she': 'Virgo', 'sho': 'Virgo',
  'na': 'Virgo', 'ni': 'Virgo', 'nu': 'Virgo', 'ne': 'Virgo', 'no': 'Virgo',
  // Libra (Tula) - Venus: Ya, Yi, Yu, Ye, Yo, Bha, Bhi, Bhu, Bhe, Bho
  'ya': 'Libra', 'yi': 'Libra', 'yu': 'Libra', 'ye': 'Libra', 'yo': 'Libra',
  'bha': 'Libra', 'bhi': 'Libra', 'bhu': 'Libra', 'bhe': 'Libra', 'bho': 'Libra',
  // Scorpio (Vrishchik) - Mars: No, To, Ni, Nu, Ne, Na, Tha, Thi, Thu, The, Tho
  'no': 'Scorpio', 'to': 'Scorpio', 'ni': 'Scorpio', 'nu': 'Scorpio', 'ne': 'Scorpio',
  'tha': 'Scorpio', 'thi': 'Scorpio', 'thu': 'Scorpio', 'the': 'Scorpio', 'tho': 'Scorpio',
  // Sagittarius (Dhanu) - Jupiter: Pay, Pi, Pu, Pe, Po, Sa, Si, Su, Se, So
  'pay': 'Sagittarius', 'pi': 'Sagittarius', 'pu': 'Sagittarius', 'pe': 'Sagittarius', 'po': 'Sagittarius',
  'sa': 'Sagittarius', 'si': 'Sagittarius', 'su': 'Sagittarius', 'se': 'Sagittarius', 'so': 'Sagittarius',
  // Capricorn (Makara) - Saturn: Kha, Khi, Khu, Khe, Kho, Ga, Gi, Gu, Ge, Go
  'kha': 'Capricorn', 'khi': 'Capricorn', 'khu': 'Capricorn', 'khe': 'Capricorn', 'kho': 'Capricorn',
  'ga': 'Capricorn', 'gi': 'Capricorn', 'gu': 'Capricorn', 'ge': 'Capricorn', 'go': 'Capricorn',
  // Aquarius (Kumbha) - Saturn: Ta, Ti, Tu, Te, To, Sa, Si, Su, Se, So (additional)
  'taq': 'Aquarius', 'tiq': 'Aquarius', 'tuq': 'Aquarius', 'saq': 'Aquarius', // variant
  'gaa': 'Aquarius',
  // Pisces (Meena) - Jupiter: Ya, Yi, Yu, Ye, Yo, Bha, Bhi, Bhu, Bhe, Bho, Ja, Ji, Ju, Je, Jo
  'ja': 'Pisces', 'ji': 'Pisces', 'ju': 'Pisces', 'je': 'Pisces', 'jo': 'Pisces'
};

function getRashiFromName(name) {
  if (!name || name.length === 0) return "Unknown";
  const lowerName = name.toLowerCase();
  // check two-letter combinations first
  for (let len = 3; len >= 1; len--) {
    let prefix = lowerName.substring(0, len);
    if (rashiMap[prefix]) return rashiMap[prefix];
  }
  // fallback based on first letter phonetic group (common Vedic)
  const firstChar = lowerName[0];
  if ('aeiou'.includes(firstChar)) return 'Aries'; // vowel start default
  if ('kkgghh'.includes(firstChar)) return 'Gemini';
  if ('cchjj'.includes(firstChar)) return 'Cancer';
  if ('tddtnn'.includes(firstChar)) return 'Leo';
  if ('ppbbff'.includes(firstChar)) return 'Virgo';
  if ('yy'.includes(firstChar)) return 'Libra';
  if ('rrss'.includes(firstChar)) return 'Scorpio';
  if ('mm'.includes(firstChar)) return 'Sagittarius';
  return 'Pisces';
}

// 2. PLANETARY RULER & GRAHA MAITRI (friendship score)
const planetOfRashi = {
  'Aries': 'Mars', 'Taurus': 'Venus', 'Gemini': 'Mercury', 'Cancer': 'Moon',
  'Leo': 'Sun', 'Virgo': 'Mercury', 'Libra': 'Venus', 'Scorpio': 'Mars',
  'Sagittarius': 'Jupiter', 'Capricorn': 'Saturn', 'Aquarius': 'Saturn', 'Pisces': 'Jupiter'
};

// Vedic planetary friendship table (mutual score out of 10)
const planetaryFriendship = {
  'Sun': { 'Moon': 5, 'Mars': 8, 'Mercury': 6, 'Jupiter': 9, 'Venus': 7, 'Saturn': 4, 'Sun': 10 },
  'Moon': { 'Sun': 5, 'Mars': 4, 'Mercury': 8, 'Jupiter': 7, 'Venus': 9, 'Saturn': 3, 'Moon': 10 },
  'Mars': { 'Sun': 8, 'Moon': 4, 'Mercury': 6, 'Jupiter': 7, 'Venus': 5, 'Saturn': 3, 'Mars': 10 },
  'Mercury': { 'Sun': 6, 'Moon': 8, 'Mars': 6, 'Jupiter': 9, 'Venus': 8, 'Saturn': 5, 'Mercury': 10 },
  'Jupiter': { 'Sun': 9, 'Moon': 7, 'Mars': 7, 'Mercury': 9, 'Venus': 8, 'Saturn': 5, 'Jupiter': 10 },
  'Venus': { 'Sun': 7, 'Moon': 9, 'Mars': 5, 'Mercury': 8, 'Jupiter': 8, 'Saturn': 4, 'Venus': 10 },
  'Saturn': { 'Sun': 4, 'Moon': 3, 'Mars': 3, 'Mercury': 5, 'Jupiter': 5, 'Venus': 4, 'Saturn': 10 }
};

function getPlanetAffinity(planetA, planetB) {
  if (planetA === planetB) return 10;
  const score = planetaryFriendship[planetA]?.[planetB];
  if (score !== undefined) return score;
  return 5; // neutral
}

// 3. NAKSHATRA SIMULATION (lunar mansion harmony based on name length + vowel sum)
function nakshatraHarmony(name1, name2) {
  // sum of character codes modulo 27 (nakshatra count)
  let code1 = 0, code2 = 0;
  for (let i = 0; i < name1.length; i++) code1 += name1.charCodeAt(i);
  for (let i = 0; i < name2.length; i++) code2 += name2.charCodeAt(i);
  const nakshatra1 = code1 % 27;
  const nakshatra2 = code2 % 27;
  const diff = Math.abs(nakshatra1 - nakshatra2);
  if (diff <= 2) return 18;  // excellent same constellation group
  if (diff <= 5) return 12;
  if (diff <= 9) return 7;
  if (diff <= 14) return 3;
  return 1;
}

// 4. Element compatibility (Fire, Earth, Air, Water)
const rashiElement = {
  'Aries': 'Fire', 'Leo': 'Fire', 'Sagittarius': 'Fire',
  'Taurus': 'Earth', 'Virgo': 'Earth', 'Capricorn': 'Earth',
  'Gemini': 'Air', 'Libra': 'Air', 'Aquarius': 'Air',
  'Cancer': 'Water', 'Scorpio': 'Water', 'Pisces': 'Water'
};

function elementCompatScore(el1, el2) {
  if (el1 === el2) return 16;   // same element strong flow
  if ((el1 === 'Fire' && el2 === 'Air') || (el1 === 'Air' && el2 === 'Fire')) return 12; // fuel
  if ((el1 === 'Earth' && el2 === 'Water') || (el1 === 'Water' && el2 === 'Earth')) return 10;
  if ((el1 === 'Fire' && el2 === 'Water')) return 3; // conflict
  return 6;
}

// 5. Vowel sound resonance (Moon compatibility)
function vowelConsonantBalance(name1, name2) {
  const vowelRegex = /[aeiou]/gi;
  const v1 = (name1.match(vowelRegex) || []).length;
  const v2 = (name2.match(vowelRegex) || []).length;
  const totalVowelDiff = Math.abs(v1 - v2);
  const score = Math.max(0, 12 - totalVowelDiff * 1.5);
  return Math.min(score, 12);
}

// MAIN FUNCTION - NO RANDOM, MAX POSSIBLE ~94%
function calculateRashiCompatibility() {
  let rawName1 = document.getElementById("name1").value.trim();
  let rawName2 = document.getElementById("name2").value.trim();
  const loveField = document.getElementById("lovevalue");

  function clean(str) {
    return str.replace(/[^A-Za-z]/g, '').toLowerCase();
  }
  const name1 = clean(rawName1);
  const name2 = clean(rawName2);

  if (!name1 || !name2) {
    alert("🌌 Both names are required. The stars need two souls to read destiny.");
    loveField.value = "";
    return;
  }
  if (name1.length < 3 || name2.length < 3) {
    alert("🪐 Vedic tradition requires at least 3 letters for accurate Rashi calculation.");
    loveField.value = "";
    return;
  }

  const rashi1 = getRashiFromName(name1);
  const rashi2 = getRashiFromName(name2);
  const planet1 = planetOfRashi[rashi1];
  const planet2 = planetOfRashi[rashi2];
  const planetScore = getPlanetAffinity(planet1, planet2);   // 0-10 scale

  const element1 = rashiElement[rashi1];
  const element2 = rashiElement[rashi2];
  const elementScore = elementCompatScore(element1, element2); // max 16

  const nakshatraScore = nakshatraHarmony(name1, name2); // max 18
  const vowelRhythm = vowelConsonantBalance(name1, name2); // max 12

  // same rashi gives spiritual alignment but not 100% automatic (max +12)
  const rashiSameBonus = (rashi1 === rashi2) ? 12 : (rashi1 === rashi2 ? 0 : 0);
  // name length synergy (minimal)
  const lengthDiff = Math.abs(name1.length - name2.length);
  const lengthScore = lengthDiff === 0 ? 9 : lengthDiff <= 2 ? 6 : lengthDiff <= 4 ? 3 : 1;

  // base percentage without random: sum of all components out of max possible (10+16+18+12+12+9 = max 77 base)
  let rawPercent = planetScore + elementScore + nakshatraScore + vowelRhythm + rashiSameBonus + lengthScore;
  
  // Additional dosha/planetary exaltation check: Moon-Venus connection (extra max 8)
  const moonVenusBoost = ((planet1 === 'Moon' && planet2 === 'Venus') || (planet2 === 'Moon' && planet1 === 'Venus')) ? 8 :
                         ((planet1 === 'Jupiter' && planet2 === 'Venus') || (planet1 === 'Venus' && planet2 === 'Jupiter')) ? 6 : 0;
  
  let finalScore = rawPercent + moonVenusBoost;
  
  // Cap maximum at 94 (realistically divine match is rare, never 100%)
  finalScore = Math.min(94, finalScore);
  finalScore = Math.max(8, Math.floor(finalScore));   // minimum 8% for very incompatible
  
  // If rashi are same + planet same + elements same + nakshatra near perfect => max 94, not 100
  if (rashi1 === rashi2 && planet1 === planet2 && element1 === element2 && nakshatraScore >= 16) {
    finalScore = Math.min(94, finalScore + 2);
  }
  
  // Ensure no 100% under any circumstances (honest astrological rule)
  if (finalScore >= 100) finalScore = 96;
  if (finalScore === 100) finalScore = 94; // safety
  
  loveField.value = finalScore + "%";
  
  // tooltip message based on final percentage
  let message = "";
  if (finalScore >= 85) message = "🌟 Exceptional Graha Maitri! Strong karmic cosmic bond. 🌟";
  else if (finalScore >= 70) message = "💞 Very good Rashi compatibility. Nurture with devotion. 💞";
  else if (finalScore >= 50) message = "🌙 Moderate alignment — communication and respect will elevate this union. 🌙";
  else if (finalScore >= 30) message = "⚡ Challenging planetary aspects but love transcends charts. ⚡";
  else message = "🌑 Opposing energies — requires conscious efforts and patience. 🌑";
  loveField.title = message;
  
  // brief display of rashi for user (optional)
  const oldHint = document.querySelector('.rashi-badge');
  if (oldHint && !document.getElementById('rashiDisplay')) {
    let extra = document.createElement('div');
    extra.id = 'rashiDisplay';
    extra.className = 'small text-muted mt-2';
    extra.innerHTML = `🔮 ${name1.substring(0,1).toUpperCase()+name1.substring(1)} (${rashi1}) ❤️ ${name2.substring(0,1).toUpperCase()+name2.substring(1)} (${rashi2})`;
    oldHint.parentNode.insertBefore(extra, oldHint.nextSibling);
    setTimeout(() => extra.remove(), 3500);
  }
}
</script>
</body>
</html>
